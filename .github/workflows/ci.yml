name: CI

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Boot iOS simulator
        shell: bash
        run: |
          simulator="$(
            xcrun simctl list devices available --json |
              jq -r '[.devices[][] | select(.name | startswith("iPhone"))][0] | [.udid, .state] | @tsv'
          )"
          IFS=$'\t' read -r simulator_udid simulator_state <<< "$simulator"
          if [[ -z "$simulator_udid" || "$simulator_udid" == "null" ]]; then
            echo "No available iPhone simulator was found."
            exit 1
          fi
          if [[ "$simulator_state" != "Booted" ]]; then
            xcrun simctl boot "$simulator_udid"
          fi
          xcrun simctl bootstatus "$simulator_udid" --block

      - name: Check editor
        run: |
          ./gradlew \
            :editor:assembleDebug \
            :editor:allTests \
            :editor:apiCheck

      - name: Check native iOS SDK
        run: |
          ./gradlew \
            :editor-ios-sdk:allTests \
            :editor-ios-sdk:apiCheck \
            :editor-ios-sdk:assembleCascadeEditorDebugXCFramework
